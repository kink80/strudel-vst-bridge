name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build (arm64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/strudel-vst-bridge \
            target/x86_64-apple-darwin/release/strudel-vst-bridge \
            -output strudel-vst-bridge

      - name: Package
        run: |
          tar czf strudel-vst-bridge-macos-universal.tar.gz strudel-vst-bridge
          shasum -a 256 strudel-vst-bridge-macos-universal.tar.gz > strudel-vst-bridge-macos-universal.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            strudel-vst-bridge-macos-universal.tar.gz
            strudel-vst-bridge-macos-universal.tar.gz.sha256
